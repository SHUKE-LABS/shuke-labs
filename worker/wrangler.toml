# Standalone "like" counter Worker (issue #93). Deployed independently of the
# Astro site — see worker/README.md for the one-time provisioning + deploy.
name = "shukelabs-like"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Serve on the stable, host-independent endpoint both origins hit; the Worker
# routes each request to its environment's namespace by Origin (#97).
routes = [
  { pattern = "like.shukelabs.com", custom_domain = true },
]

# Single D1 counter store; rows are namespaced by (env, slug) so beta and prod
# stay isolated without a second database (#97). Fill database_id after
# `wrangler d1 create shukelabs-like` (README step 1); the binding name DB is
# what src/index.js reads as env.DB.
[[d1_databases]]
binding = "DB"
database_name = "shukelabs-like"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
