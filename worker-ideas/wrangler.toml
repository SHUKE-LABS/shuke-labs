# Standalone idea-submission intake Worker (issue #14). Deployed independently
# of the Astro site and separately from the `shukelabs-like` Worker — its own
# name, D1 database, and secrets, so its blast radius never overlaps the like
# counter's. See worker-ideas/README.md for the one-time provisioning + deploy.
name = "shukelabs-ideas"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Serve on a stable, host-independent endpoint both site origins hit; the Worker
# gates /submit by Origin (prod | beta) and serves the public /idea/:id receipt.
routes = [
  { pattern = "ideas.shukelabs.com", custom_domain = true },
]

# D1 store owned solely by this Worker. Fill database_id after
# `wrangler d1 create shukelabs-ideas` (README step 1); the binding name DB is
# what src/index.js reads as env.DB.
[[d1_databases]]
binding = "DB"
database_name = "shukelabs-ideas"
database_id = "247f9fa5-66ae-49ce-bb39-f180a8d1d96a"

# Secrets are NOT set here — provision them with `wrangler secret put` (README):
#   TURNSTILE_SECRET  Cloudflare Turnstile secret key (server-side verify)
#   INTERNAL_SECRET   shared bearer guarding /internal/* (also salts the IP hash)
