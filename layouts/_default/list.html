{{ define "main" }}
<div class="container">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages }}
    <div class="list-item">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        {{ if .Description }}
        <p>{{ .Description }}</p>
        {{ end }}
    </div>
    {{ end }}
</div>
{{ end }}
